<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | T&S Operations Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F9FAFB; color: #374151; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .container { text-align: center; max-width: 400px; }
    .icon { width: 64px; height: 64px; margin: 0 auto 24px; color: #9CA3AF; }
    h1 { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p { font-size: 15px; line-height: 1.6; color: #6B7280; margin-bottom: 24px; }
    button { background: #1D6AE5; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:active { background: #1555C0; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636a9 9 0 010 12.728m-2.829-2.829a5 5 0 000-7.07m-4.243 9.9a9 9 0 01-6.364-2.636m2.829-2.829a5 5 0 017.07 0"/>
      <line x1="3" y1="3" x2="21" y2="21" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
